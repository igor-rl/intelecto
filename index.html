<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelecto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">

</head>
<body>

<div class="wrap dateline">
  <span id="dateline-left">—</span>
  <span id="dateline-right">Edição digital · atualizado continuamente</span>
</div>

<header class="masthead">
  <div class="kicker">Geopolítica &amp; Mídia Global · Principais jornais mundiais</div>
  <h1>T<span>he</span> I<span>ntelecto</span> N<span>ews</span></h1>
  <div class="tagline">Fique por dentro de tudo que acontece no mundo.</div>
</header>

<div class="ticker-bar">
  <div class="wrap">
    <div class="ticker-label">Destaques</div>
    <div class="ticker-viewport">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </div>
</div>

<nav class="navbar">
  <div class="wrap">
    <div class="nav-scroll" id="nav-scroll">
      <a href="#capa">Capa</a>
    </div>
  </div>
</nav>

<main class="wrap">
  <section class="capa" id="capa">
    <div id="capa-content" class="state-msg">Carregando edição…</div>
  </section>

  <div id="sections-root"></div>
</main>

<footer>
  <hr class="rule">
  Intelecto · Edição automatizada · Os links de cada matéria apontam para a fonte original
</footer>

<script>
(function(){

  const DATA_URL = "data-base/content.json";

  function fmtDate(iso){
    if(!iso) return "";
    try{
      const d = new Date(iso);
      return d.toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    }catch(e){ return ""; }
  }

  function el(tag, cls, html){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(html !== undefined) e.innerHTML = html;
    return e;
  }

  function escapeHtml(str){
    if(!str) return "";
    return str.replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function renderDateline(jornal){
    const left = document.getElementById('dateline-left');
    const d = jornal && jornal.edicao ? jornal.edicao : new Date().toISOString().slice(0,10);
    const parts = d.split('-');
    left.textContent = `Edição de ${parts[2]}/${parts[1]}/${parts[0]}`;
  }

  function renderTicker(destaques){
    const track = document.getElementById('ticker-track');
    if(!destaques || !destaques.length){
      track.parentElement.parentElement.parentElement.style.display = 'none';
      return;
    }
    const items = destaques.map(d =>
      `<a class="ticker-item" href="${d.link || '#'}" target="_blank" rel="noopener">
        <span>●</span>${escapeHtml(d.titulo)}
      </a>`
    ).join('');
    track.innerHTML = items + items; // duplicado para loop contínuo
  }

  // ---------- Capa: helpers do bloco editorial ----------

  function outletName(jornaisMap, slug){
    if(jornaisMap && jornaisMap[slug] && jornaisMap[slug].nome) return jornaisMap[slug].nome;
    return slug;
  }

  function pillsHtml(list, jornaisMap, cls){
    if(!list || !list.length) return '<span class="tema-pill-empty">—</span>';
    return list.map(s =>
      `<span class="tema-pill ${cls}">${escapeHtml(outletName(jornaisMap, s))}</span>`
    ).join('');
  }

  function temaHtml(tema, idx, jornaisMap){
    return `
      <div class="tema-item">
        <div class="tema-num">${String(idx + 1).padStart(2, '0')}</div>
        <div class="tema-body">
          <h4>${escapeHtml(tema.tema || '')}</h4>
          ${tema.descricao ? `<p class="tema-desc">${escapeHtml(tema.descricao)}</p>` : ''}
          <div class="tema-cobertura">
            <div class="tema-col">
              <span class="tema-col-label">Cobriram</span>
              <div class="tema-pills">${pillsHtml(tema.fontes_que_cobriram, jornaisMap, 'pill-in')}</div>
            </div>
            <div class="tema-col">
              <span class="tema-col-label">Ignoraram / minimizaram</span>
              <div class="tema-pills">${pillsHtml(tema.fontes_que_ignoraram_ou_minimizaram, jornaisMap, 'pill-out')}</div>
            </div>
          </div>
          ${tema.divergencia_de_enquadramento ? `<p class="tema-divergencia">${escapeHtml(tema.divergencia_de_enquadramento)}</p>` : ''}
        </div>
      </div>
    `;
  }

  function subcobertoHtml(item){
    return `
      <div class="blindspot-item">
        <h5>${escapeHtml(item.tema || '')}</h5>
        ${item.por_que_importa ? `<p>${escapeHtml(item.por_que_importa)}</p>` : ''}
        ${item.cobertura ? `<div class="blindspot-cobertura">${escapeHtml(item.cobertura)}</div>` : ''}
      </div>
    `;
  }

  // ---------- Capa: render principal ----------

  function renderCapaEditorial(root, capa, jornaisMap){
    const paragrafos = (capa.texto_editorial || '')
      .split(/\n\s*\n/)
      .filter(p => p.trim().length)
      .map(p => `<p class="editorial-p">${escapeHtml(p.trim())}</p>`)
      .join('');

    const temasHtml = (capa.temas_principais || [])
      .map((t, i) => temaHtml(t, i, jornaisMap))
      .join('');

    const subHtml = (capa.temas_subcobertos || [])
      .map(subcobertoHtml)
      .join('');

    root.innerHTML = `
      <span class="capa-eyebrow">${escapeHtml(capa.categoria_nome || 'Editorial do dia')}</span>
      <h2>${escapeHtml(capa.titulo || '')}</h2>
      ${capa.subtitulo ? `<p class="subtitulo">${escapeHtml(capa.subtitulo)}</p>` : ''}
      <div class="editorial-text">${paragrafos}</div>
      ${capa.publicado_em ? `<div class="capa-meta">Editorial · ${fmtDate(capa.publicado_em)}</div>` : ''}

      ${temasHtml ? `
        <div class="temas-block">
          <div class="temas-block-head">Temas do dia</div>
          <div class="temas-list">${temasHtml}</div>
        </div>
      ` : ''}

      ${subHtml ? `
        <div class="blindspot-block">
          <div class="blindspot-kicker">Ponto cego da cobertura</div>
          <div class="blindspot-list">${subHtml}</div>
        </div>
      ` : ''}
    `;
  }

  function renderCapaMateria(root, capa){
    root.innerHTML = `
      <div class="capa-grid">
        <div>
          <span class="capa-eyebrow">${escapeHtml(capa.categoria_nome || 'Capa')}</span>
          <h2>${escapeHtml(capa.titulo || '')}</h2>
          ${capa.subtitulo ? `<p class="subtitulo">${escapeHtml(capa.subtitulo)}</p>` : ''}
          <p class="resumo">${escapeHtml(capa.resumo || '')}</p>
          <div class="capa-meta">${escapeHtml(capa.fonte || '')}${capa.fonte && capa.publicado_em ? ' · ' : ''}${fmtDate(capa.publicado_em)}</div>
          ${capa.link ? `<a class="capa-readlink" href="${capa.link}" target="_blank" rel="noopener">Leia a matéria completa →</a>` : ''}
        </div>
        <div>
          ${capa.imagem
            ? `<img class="capa-img" src="${capa.imagem}" alt="${escapeHtml(capa.titulo || '')}" loading="lazy" onerror="this.outerHTML='&lt;div class=&quot;capa-img-placeholder&quot;&gt;Sem imagem&lt;/div&gt;'">`
            : `<div class="capa-img-placeholder">Sem imagem</div>`}
        </div>
      </div>
    `;
  }

  function renderCapa(capa, jornaisMap){
    const root = document.getElementById('capa-content');
    if(!capa){
      root.className = 'state-msg';
      root.textContent = 'Nenhuma matéria de capa disponível no momento.';
      return;
    }
    root.className = '';

    // Se o editor-chefe (LLM) gerou texto_editorial, usamos o formato novo.
    // Caso contrário, cai no formato antigo (matéria única em destaque),
    // mantendo compatibilidade com edições antigas do content.json.
    if(capa.texto_editorial){
      renderCapaEditorial(root, capa, jornaisMap);
    } else {
      renderCapaMateria(root, capa);
    }
  }

  function cardHtml(art){
    const img = art.imagem
      ? `<img src="${art.imagem}" alt="${escapeHtml(art.titulo)}" loading="lazy" onerror="this.outerHTML='&lt;div class=&quot;img-placeholder&quot;&gt;Sem imagem&lt;/div&gt;'">`
      : `<div class="img-placeholder">Sem imagem</div>`;
    return `
      <a class="card" href="${art.link || '#'}" target="_blank" rel="noopener">
        ${img}
        <h4>${escapeHtml(art.titulo || '')}</h4>
        <p>${escapeHtml(art.resumo || '')}</p>
        <div class="card-meta">
          <span>${escapeHtml(art.fonte || '')}</span>
          <span>${fmtDate(art.publicado_em)}</span>
        </div>
      </a>
    `;
  }

  function renderSections(jornais){
    const navScroll = document.getElementById('nav-scroll');
    const root = document.getElementById('sections-root');
    root.innerHTML = '';

    if(!jornais || !jornais.length){
      root.appendChild(el('div','state-msg','Nenhuma categoria com conteúdo no momento.'));
      return;
    }

    jornais.forEach(cat => {
      if(!cat.artigos || !cat.artigos.length) return;

      const navLink = el('a', null, escapeHtml(cat.nome));
      navLink.href = '#' + cat.slug;
      navScroll.appendChild(navLink);

      const section = el('section','section');
      section.id = cat.slug;

      const head = el('div','section-head');
      head.appendChild(el('h3', null, escapeHtml(cat.nome)));
      head.appendChild(el('span','count', cat.artigos.length + (cat.artigos.length === 1 ? ' matéria' : ' matérias')));
      section.appendChild(head);

      const grid = el('div','card-grid');
      grid.innerHTML = cat.artigos.map(cardHtml).join('');
      section.appendChild(grid);

      root.appendChild(section);
    });
  }

  function render(data){
    // o JSON agora vem sem o wrapper "jornal": os campos ficam direto na raiz
    renderDateline(data);
    renderTicker(data.destaques);

    // jornais é um objeto { slug: {...} }, usado tanto pelas seções
    // quanto para resolver nomes de fonte no bloco editorial da capa
    const jornaisMap = data.jornais || {};
    const jornaisArray = Object.values(jornaisMap);

    renderCapa(data.capa, jornaisMap);
    renderSections(jornaisArray);
  }

  function showError(){
    document.getElementById('capa-content').className = 'state-msg';
    document.getElementById('capa-content').textContent =
      'Não foi possível carregar data-base/content.json. Verifique se o arquivo existe e se a página está sendo servida via HTTP (não file://).';
  }

  fetch(DATA_URL, { cache: "no-store" })
    .then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(err => {
      console.error('Falha ao carregar content.json:', err);
      showError();
    });

})();
</script>
</body>
</html>
